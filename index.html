<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitoring Kesuburan Tanah</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #1f4037, #99f2c8);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #fff;
        border-radius: 20px;
        padding: 30px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      h1 {
        color: #1f4037;
        font-size: 1.5rem;
        margin-bottom: 20px;
      }

      /* Navigasi Tab */
      .nav {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        background: #f4f9f8;
        border-radius: 12px;
        padding: 6px;
      }
      .nav a {
        flex: 1;
        text-decoration: none;
        padding: 10px;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #1f4037;
        transition: background 0.2s ease, color 0.2s ease;
      }
      .nav a.active {
        background: #1f4037;
        color: #fff;
      }
      .nav a:not(.active):hover {
        background: #e2efe9;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 16px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 25px;
      }
      .status.online {
        background: #d4f8e8;
        color: #1f8a4c;
      }
      .status.offline {
        background: #fde2e2;
        color: #c0392b;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
      }
      .gauge {
        width: 200px;
        height: 200px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background: conic-gradient(
          #27ae60 0% var(--persen, 0%),
          #ecf0f1 var(--persen, 0%) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: background 0.5s ease;
      }
      .gauge::before {
        content: "";
        position: absolute;
        width: 160px;
        height: 160px;
        background: #fff;
        border-radius: 50%;
      }
      .gauge-value {
        position: relative;
        font-size: 2.5rem;
        font-weight: bold;
        color: #1f4037;
      }
      .gauge-label {
        position: absolute;
        bottom: 55px;
        font-size: 0.85rem;
        color: #7f8c8d;
      }
      .info {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        padding: 15px;
        background: #f4f9f8;
        border-radius: 12px;
        font-size: 0.9rem;
        color: #34495e;
      }
      .info div span {
        display: block;
        font-weight: bold;
        font-size: 1.1rem;
        color: #1f4037;
        margin-top: 4px;
      }
      .updated {
        margin-top: 15px;
        font-size: 0.8rem;
        color: #95a5a6;
      }
      .status-tanah {
        margin-top: 15px;
        padding: 10px;
        border-radius: 10px;
        background: #f4f9f8;
        color: #1f4037;
        font-weight: 600;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🌱 Monitoring Kesuburan Tanah</h1>

      <nav class="nav">
        <a href="index.html" class="active">Monitoring</a>
        <a href="log.html">Log Data</a>
      </nav>

      <div id="wifiStatus" class="status offline">
        <span class="dot"></span>
        <span id="wifiText">Memeriksa koneksi...</span>
      </div>

      <div class="gauge" id="gauge" style="--persen: 0%">
        <div class="gauge-value" id="persenValue">0%</div>
        <div class="gauge-label">Estimasi Kesuburan</div>
      </div>

      <div class="info">
        <div>
          ADC Raw
          <span id="adcValue">-</span>
        </div>
        <div>
          IP ESP32
          <span id="ipValue">-</span>
        </div>
      </div>

      <div class="status-tanah" id="statusTanahText">-</div>

      <div class="updated" id="lastUpdate">Belum ada data</div>
    </div>

    <script>
      // Konfigurasi Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyDdOxTgyrdXH9xwC7bU7fDMYIoTD3qzxvg",
        authDomain: "psti-b376f.firebaseapp.com",
        databaseURL:
          "https://psti-b376f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "psti-b376f",
        storageBucket: "psti-b376f.firebasestorage.app",
        messagingSenderId: "658575197616",
        appId: "1:658575197616:web:da2d5e9032eee01465c275",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // Interval minimum antar pencatatan log (ms) agar database tidak penuh
      const LOG_INTERVAL_MS = 5 * 60 * 1000; // 5 menit
      let lastLogTime = 0;

      // Simpan satu entri log ke /logs
      function simpanLog(persen, adc, ip, kondisi) {
        const now = Date.now();
        if (now - lastLogTime < LOG_INTERVAL_MS) return;
        lastLogTime = now;

        db.ref("/logs").push({
          timestamp: now,
          waktu: new Date(now).toLocaleString("id-ID"),
          kesuburan: persen,
          adc: adc,
          ip: ip || "-",
          kondisi: kondisi || "-",
        });
      }

      let ipTerakhir = "-";

      // Listener data sensor
      db.ref("/sensor").on("value", (snapshot) => {
        const data = snapshot.val();

        console.log("Data Sensor dari Firebase:", data);

        if (!data) {
          document.getElementById("lastUpdate").textContent =
            "Node /sensor kosong di Firebase";
          return;
        }

        const persen = Number(data.kesuburan) || 0;
        const adc = data.adc !== undefined ? data.adc : "-";

        document
          .getElementById("gauge")
          .style.setProperty("--persen", persen + "%");
        document.getElementById("persenValue").textContent = persen + "%";
        document.getElementById("adcValue").textContent = adc;

        // Menentukan kondisi tanah berdasarkan nilai ADC
        let kondisiTanah = "Normal";
        if (adc < 1000) {
          kondisiTanah = "Sangat Kering (Gersang)";
        } else if (adc >= 1000 && adc <= 2500) {
          kondisiTanah = "Lembap (Sangat Ideal)";
        } else {
          kondisiTanah = "Terlalu Basah / Jenuh Air";
        }
        document.getElementById("statusTanahText").textContent = kondisiTanah;

        const now = new Date();
        document.getElementById("lastUpdate").textContent =
          "Update terakhir: " + now.toLocaleTimeString("id-ID");

        // Catat ke log secara berkala
        simpanLog(persen, adc, ipTerakhir, kondisiTanah);
      });

      // Listener status koneksi wifi ESP32
      db.ref("/status").on("value", (snapshot) => {
        const status = snapshot.val();
        console.log("Data Status dari Firebase:", status);

        const wifiStatus = document.getElementById("wifiStatus");
        const wifiText = document.getElementById("wifiText");
        const ipValue = document.getElementById("ipValue");

        if (
          status &&
          (status.wifi_connected === true || status.wifi_connected === "true")
        ) {
          wifiStatus.className = "status online";
          wifiText.textContent = "ESP32 Terhubung";
          ipValue.textContent = status.ip_address || "-";
          ipTerakhir = status.ip_address || "-";
        } else {
          wifiStatus.className = "status offline";
          wifiText.textContent = "ESP32 Offline";
          ipValue.textContent = "-";
          ipTerakhir = "-";
        }
      });
    </script>
  </body>
</html>

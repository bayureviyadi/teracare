<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Monitoring Kesuburan Tanah (Bluetooth Murni)</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #1f4037, #99f2c8);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #fff;
        border-radius: 20px;
        padding: 30px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      h1 {
        color: #1f4037;
        font-size: 1.5rem;
        margin-bottom: 20px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 16px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 25px;
      }
      .status.online {
        background: #d4f8e8;
        color: #1f8a4c;
      }
      .status.offline {
        background: #fde2e2;
        color: #c0392b;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
      }
      .gauge {
        width: 200px;
        height: 200px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background: conic-gradient(
          #27ae60 0% var(--persen, 0%),
          #ecf0f1 var(--persen, 0%) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: background 0.5s ease;
      }
      .gauge::before {
        content: "";
        position: absolute;
        width: 160px;
        height: 160px;
        background: #fff;
        border-radius: 50%;
      }
      .gauge-value {
        position: relative;
        font-size: 2.5rem;
        font-weight: bold;
        color: #1f4037;
      }
      .gauge-label {
        position: absolute;
        bottom: 55px;
        font-size: 0.85rem;
        color: #7f8c8d;
      }
      .info {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        padding: 15px;
        background: #f4f9f8;
        border-radius: 12px;
        font-size: 0.9rem;
        color: #34495e;
      }
      .info div span {
        display: block;
        font-weight: bold;
        font-size: 1.1rem;
        color: #1f4037;
        margin-top: 4px;
      }
      .updated {
        margin-top: 15px;
        font-size: 0.8rem;
        color: #95a5a6;
        margin-bottom: 15px;
      }
      .btn-connect {
        background: #27ae60;
        color: white;
        border: none;
        padding: 12px 15px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        font-size: 1rem;
        box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        transition: all 0.2s;
      }
      .btn-connect:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🌱 Smart Farming Direct</h1>

      <div id="bleStatus" class="status offline">
        <span class="dot"></span>
        <span id="statusText">Alat Belum Terhubung</span>
      </div>

      <div class="gauge" id="gauge" style="--persen: 0%">
        <div class="gauge-value" id="persenValue">0%</div>
        <div class="gauge-label">Kelembaban/Kesuburan</div>
      </div>

      <div class="info">
        <div>
          ADC Raw
          <span id="adcValue">-</span>
        </div>
        <div>
          Koneksi
          <span id="modeValue">Bluetooth BLE</span>
        </div>
      </div>

      <div class="updated" id="lastUpdate">Silakan klik tombol di bawah</div>

      <button class="btn-connect" id="btnConnect">🔌 HUBUNGKAN ALAT</button>
    </div>

    <script>
      const UUID_SERVICE = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
      const UUID_CHARACTERISTIC = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

      const btnConnect = document.getElementById("btnConnect");
      const bleStatus = document.getElementById("bleStatus");
      const statusText = document.getElementById("statusText");
      const persenValue = document.getElementById("persenValue");
      const adcValue = document.getElementById("adcValue");
      const gauge = document.getElementById("gauge");
      const lastUpdate = document.getElementById("lastUpdate");

      btnConnect.addEventListener("click", async () => {
        try {
          statusText.textContent = "Mencari alat...";
          
          // 1. Request bluetooth dengan nama spesifik ESP32 kita
          const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "ESP32_SmartFarming" }],
            optionalServices: [UUID_SERVICE]
          });

          // 2. Hubungkan ke GATT Server alat
          const server = await device.gatt.connect();
          
          // 3. Ambil Service dan Karakteristik data
          const service = await server.getPrimaryService(UUID_SERVICE);
          const characteristic = await service.getCharacteristic(UUID_CHARACTERISTIC);
          
          // 4. Aktifkan listener (Menerima kiriman berkala secara otomatis dari ESP32)
          await characteristic.startNotifications();
          
          // Mengubah UI menjadi Online/Terhubung
          bleStatus.className = "status online";
          statusText.textContent = "Alat Terhubung";
          btnConnect.style.display = "none"; // Sembunyikan tombol jika sudah konek
          lastUpdate.textContent = "Menerima data secara real-time...";

          characteristic.addEventListener("characteristicvaluechanged", (event) => {
            // Membaca kiriman paket data string dari ESP32
            const decoder = new TextDecoder("utf-8");
            const dataMentah = decoder.decode(event.target.value);
            
            // Memecah kembali data "nilaiADC,persentase"
            const partData = dataMentah.split(",");
            const rawADC = partData[0];
            const persen = Number(partData[1]) || 0;

            // Tampilkan ke komponen UI Website
            gauge.style.setProperty("--persen", persen + "%");
            persenValue.textContent = persen + "%";
            adcValue.textContent = rawADC;
            
            const now = new Date();
            lastUpdate.textContent = "Update: " + now.toLocaleTimeString("id-ID") + " WIB";
          });

          // Listener jika koneksi Bluetooth terputus di tengah jalan
          device.addEventListener('gattserverdisconnected', () => {
            bleStatus.className = "status offline";
            statusText.textContent = "Alat Terputus";
            btnConnect.style.display = "block";
            adcValue.textContent = "-";
            gauge.style.setProperty("--persen", "0%");
            persenValue.textContent = "0%";
            lastUpdate.textContent = "Koneksi terputus. Silakan hubungkan ulang.";
          });

        } catch (error) {
          console.error(error);
          bleStatus.className = "status offline";
          statusText.textContent = "Alat Belum Terhubung";
          alert("Koneksi dibatalkan atau Bluetooth error.");
        }
      });
    </script>
  </body>
</html>

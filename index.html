<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitoring Kesuburan Tanah</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #1f4037, #99f2c8);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #fff;
        border-radius: 20px;
        padding: 30px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      h1 {
        color: #1f4037;
        font-size: 1.5rem;
        margin-bottom: 20px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 16px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 25px;
      }
      .status.online {
        background: #d4f8e8;
        color: #1f8a4c;
      }
      .status.offline {
        background: #fde2e2;
        color: #c0392b;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
      }
      .gauge {
        width: 200px;
        height: 200px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background: conic-gradient(
          #27ae60 0% var(--persen, 0%),
          #ecf0f1 var(--persen, 0%) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: background 0.5s ease;
      }
      .gauge::before {
        content: "";
        position: absolute;
        width: 160px;
        height: 160px;
        background: #fff;
        border-radius: 50%;
      }
      .gauge-value {
        position: relative;
        font-size: 2.5rem;
        font-weight: bold;
        color: #1f4037;
      }
      .gauge-label {
        position: absolute;
        bottom: 55px;
        font-size: 0.85rem;
        color: #7f8c8d;
      }
      .info {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        padding: 15px;
        background: #f4f9f8;
        border-radius: 12px;
        font-size: 0.9rem;
        color: #34495e;
      }
      .info div span {
        display: block;
        font-weight: bold;
        font-size: 1.1rem;
        color: #1f4037;
        margin-top: 4px;
      }
      .updated {
        margin-top: 15px;
        font-size: 0.8rem;
        color: #95a5a6;
        margin-bottom: 15px;
      }
      
      /* --- STYLE BARU UNTUK BLUETOOTH CONFIG --- */
      .btn-ble {
        background: #2980b9;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
        transition: background 0.2s;
      }
      .btn-ble:hover { background: #2471a3; }
      .ble-panel {
        display: none;
        margin-top: 15px;
        padding: 15px;
        border: 1px dashed #2980b9;
        border-radius: 10px;
        background: #f2f7fa;
      }
      .ble-input {
        width: 100%;
        padding: 8px;
        margin: 5px 0 10px 0;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
      }
      .btn-send {
        background: #27ae60;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🌱 Monitoring Kesuburan Tanah</h1>

      <div id="wifiStatus" class="status offline">
        <span class="dot"></span>
        <span id="wifiText">Memeriksa koneksi...</span>
      </div>

      <div class="gauge" id="gauge" style="--persen: 0%">
        <div class="gauge-value" id="persenValue">0%</div>
        <div class="gauge-label">Estimasi Kesuburan</div>
      </div>

      <div class="info">
        <div>
          ADC Raw
          <span id="adcValue">-</span>
        </div>
        <div>
          IP ESP32
          <span id="ipValue">-</span>
        </div>
      </div>

      <div class="updated" id="lastUpdate">Belum ada data</div>

      <button class="btn-ble" id="btnConnectBLE">⚙️ Pengaturan Wi-Fi via Bluetooth</button>
      
      <div class="ble-panel" id="blePanel">
        <input type="text" id="ssidInput" class="ble-input" placeholder="Nama Wi-Fi (SSID)">
        <input type="password" id="passInput" class="ble-input" placeholder="Password Wi-Fi">
        <button class="btn-send" id="btnSendWiFi">Kirim & Sambungkan</button>
      </div>
    </div>

    <script>
      // Konfigurasi Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyDdOxTgyrdXH9xwC7bU7fDMYIoTD3qzxvg",
        authDomain: "psti-b376f.firebaseapp.com",
        databaseURL: "https://psti-b376f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "psti-b376f",
        storageBucket: "psti-b376f.firebasestorage.app",
        messagingSenderId: "658575197616",
        appId: "1:658575197616:web:da2d5e9032eee01465c275",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // Listener data sensor dari Firebase
      db.ref("/sensor").on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        const persen = Number(data.kesuburan) || 0;
        document.getElementById("gauge").style.setProperty("--persen", persen + "%");
        document.getElementById("persenValue").textContent = persen + "%";
        document.getElementById("adcValue").textContent = data.adc !== undefined ? data.adc : "-";
        const now = new Date();
        document.getElementById("lastUpdate").textContent = "Update terakhir: " + now.toLocaleTimeString("id-ID");
      });

      // Listener status koneksi wifi ESP32
      db.ref("/status").on("value", (snapshot) => {
        const status = snapshot.val();
        const wifiStatus = document.getElementById("wifiStatus");
        const wifiText = document.getElementById("wifiText");
        const ipValue = document.getElementById("ipValue");

        if (status && (status.wifi_connected === true || status.wifi_connected === "true")) {
          wifiStatus.className = "status online";
          wifiText.textContent = "ESP32 Terhubung";
          ipValue.textContent = status.ip_address || "-";
        } else {
          wifiStatus.className = "status offline";
          wifiText.textContent = "ESP32 Offline";
          ipValue.textContent = "-";
        }
      });

      // --- LOGIKA WEB BLUETOOTH API ---
      let bleCharacteristic;
      const UUID_SERVICE = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
      const UUID_CHARACTERISTIC = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

      document.getElementById("btnConnectBLE").addEventListener("click", async () => {
        try {
          console.log("Mencari Perangkat Bluetooth...");
          const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "ESP32_SmartFarming" }],
            optionalServices: [UUID_SERVICE]
          });

          const server = await device.gatt.connect();
          const service = await server.getPrimaryService(UUID_SERVICE);
          bleCharacteristic = await service.getCharacteristic(UUID_CHARACTERISTIC);
          
          alert("Bluetooth Terhubung Berhasil!");
          document.getElementById("blePanel").style.display = "block";
        } catch (error) {
          console.error("Gagal koneksi BLE:", error);
          alert("Gagal terhubung Bluetooth. Pastikan Bluetooth HP aktif.");
        }
      });

      document.getElementById("btnSendWiFi").addEventListener("click", async () => {
        const ssid = document.getElementById("ssidInput").value;
        const pass = document.getElementById("passInput").value;

        if (!ssid) { alert("Nama Wi-Fi tidak boleh kosong!"); return; }

        // Format data yang dikirim ke ESP32: "namaWiFi;passwordWiFi"
        const dataPaket = ssid + ";" + pass; 
        const encoder = new TextEncoder();
        const dataBuffer = encoder.encode(dataPaket);

        try {
          if (bleCharacteristic) {
            await bleCharacteristic.writeValue(dataBuffer);
            alert("Data Wi-Fi berhasil dikirim! Menunggu ESP32 menyambung internet...");
            document.getElementById("blePanel").style.display = "none";
          }
        } catch (error) {
          alert("Gagal mengirim data via Bluetooth.");
        }
      });
    </script>
  </body>
</html>
